[package]
authors = ["nathanfaucett@gmail.com"]
default-run = "auth"
description = "Aicacia Auth"
edition = "2021"
license = "MIT/Apache-2.0"
name = "auth"
readme = "README.md"
repository = ""
rust-version = "1.72"
version = "0.1.0"

[dependencies]
actix-cors = "0"
actix-web = "4"
actix-web-validator = "5"
anyhow = "1"
base64 = "0"
chrono = {version = "0", features = ["serde"]}
config = "0"
dotenv = "0"
env_logger = "0"
futures = "0"
jsonwebtoken = "8"
lazy_static = "1"
lettre = "0"
log = "0"
once_cell = "1"
openssl = {version = "0", features = ["vendored"]}
rand = "0"
regex = "1"
rust-argon2 = "2"
serde = {version = "1", features = ["derive"]}
serde_json = "1"
sqlx = {version = "0", features = ["runtime-tokio-native-tls", "postgres", "uuid", "chrono", "json", "tls", "macros", "offline"]}
tokio = {version = "1", features = ["macros"]}
utoipa = {version = "3", features = ["actix_extras", "chrono", "uuid"]}
utoipa-swagger-ui = {version = "3", features = ["actix-web"]}
uuid = {version = "1", features = ["v4", "serde"]}
validator = {version = "0", features = ["derive"]}

[profile.release]
lto = true
opt-level = "s"
panic = "abort"
strip = "symbols"

[workspace]
members = []
